events {}

http {
    upstream checkpointai_nodes {
        server checkpointai:8000 max_fails=3 fail_timeout=10s;
        server checkpointai-secondary:8000 max_fails=3 fail_timeout=10s backup;
    }

    server {
        listen 8080;

        location /health {
            proxy_pass http://checkpointai_nodes/health;
        }

        location / {
            proxy_pass http://checkpointai_nodes;
        }
    }
}

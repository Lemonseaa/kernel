events {}

http {
    upstream kernel_nodes {
        server kernel:8000 max_fails=3 fail_timeout=10s;
        server kernel-secondary:8000 max_fails=3 fail_timeout=10s backup;
    }

    server {
        listen 8080;

        location /health {
            proxy_pass http://kernel_nodes/health;
        }

        location / {
            proxy_pass http://kernel_nodes;
        }
    }
}

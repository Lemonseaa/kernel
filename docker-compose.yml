services:
  opc-os:
    build:
      context: .
    container_name: opc-os
    environment:
      OPC_OS_DB_PATH: ${OPC_OS_DB_PATH:-/app/data/opc_os.db}
      OPC_OS_DEFAULT_PROVIDER: ${OPC_OS_DEFAULT_PROVIDER:-minimax}
      OPC_OS_DRY_RUN: ${OPC_OS_DRY_RUN:-false}
      OPC_OS_MINIMAX_API_KEY: ${OPC_OS_MINIMAX_API_KEY:-}
      OPC_OS_MINIMAX_MODEL: ${OPC_OS_MINIMAX_MODEL:-MiniMax-M2.7-highspeed}
      OPC_OS_MINIMAX_BASE_URL: ${OPC_OS_MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      OPC_OS_MINIMAX_TIMEOUT_SECONDS: ${OPC_OS_MINIMAX_TIMEOUT_SECONDS:-30}
      OPC_OS_MINIMAX_MAX_RETRIES: ${OPC_OS_MINIMAX_MAX_RETRIES:-2}
      OPC_OS_OPENAI_API_KEY: ${OPC_OS_OPENAI_API_KEY:-}
      OPC_OS_OPENAI_MODEL: ${OPC_OS_OPENAI_MODEL:-gpt-4.1-mini}
      OPC_OS_OPENAI_BASE_URL: ${OPC_OS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPC_OS_OPENAI_TIMEOUT_SECONDS: ${OPC_OS_OPENAI_TIMEOUT_SECONDS:-30}
      OPC_OS_OPENAI_MAX_RETRIES: ${OPC_OS_OPENAI_MAX_RETRIES:-2}
      OPC_OS_MAX_CONCURRENCY: ${OPC_OS_MAX_CONCURRENCY:-1}
      OPC_OS_LLM_CACHE_ENABLED: ${OPC_OS_LLM_CACHE_ENABLED:-true}
      OPC_OS_LLM_CACHE_MAX_SIZE: ${OPC_OS_LLM_CACHE_MAX_SIZE:-128}
      OPC_OS_LLM_CACHE_TTL_SECONDS: ${OPC_OS_LLM_CACHE_TTL_SECONDS:-300}
      OPC_OS_SLOW_TASK_THRESHOLD_SECONDS: ${OPC_OS_SLOW_TASK_THRESHOLD_SECONDS:-5}
      OPC_OS_SERVICE_HEARTBEAT_SECONDS: ${OPC_OS_SERVICE_HEARTBEAT_SECONDS:-30}
      OPC_OS_HA_ENABLED: ${OPC_OS_HA_ENABLED:-false}
      OPC_OS_INSTANCE_ID: ${OPC_OS_INSTANCE_ID:-opc-os-primary}
      OPC_OS_HA_LEASE_TTL_SECONDS: ${OPC_OS_HA_LEASE_TTL_SECONDS:-30}
      OPC_OS_HA_HEARTBEAT_SECONDS: ${OPC_OS_HA_HEARTBEAT_SECONDS:-10}
    volumes:
      - opc-os-data:/app/data
    healthcheck:
      test: ["CMD", "python", "scripts/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  opc-os-secondary:
    build:
      context: .
    container_name: opc-os-secondary
    profiles: ["ha"]
    environment:
      OPC_OS_DB_PATH: ${OPC_OS_DB_PATH:-/app/data/opc_os.db}
      OPC_OS_DEFAULT_PROVIDER: ${OPC_OS_DEFAULT_PROVIDER:-minimax}
      OPC_OS_DRY_RUN: ${OPC_OS_DRY_RUN:-false}
      OPC_OS_MINIMAX_API_KEY: ${OPC_OS_MINIMAX_API_KEY:-}
      OPC_OS_MINIMAX_MODEL: ${OPC_OS_MINIMAX_MODEL:-MiniMax-M2.7-highspeed}
      OPC_OS_MINIMAX_BASE_URL: ${OPC_OS_MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      OPC_OS_MINIMAX_TIMEOUT_SECONDS: ${OPC_OS_MINIMAX_TIMEOUT_SECONDS:-30}
      OPC_OS_MINIMAX_MAX_RETRIES: ${OPC_OS_MINIMAX_MAX_RETRIES:-2}
      OPC_OS_OPENAI_API_KEY: ${OPC_OS_OPENAI_API_KEY:-}
      OPC_OS_OPENAI_MODEL: ${OPC_OS_OPENAI_MODEL:-gpt-4.1-mini}
      OPC_OS_OPENAI_BASE_URL: ${OPC_OS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPC_OS_OPENAI_TIMEOUT_SECONDS: ${OPC_OS_OPENAI_TIMEOUT_SECONDS:-30}
      OPC_OS_OPENAI_MAX_RETRIES: ${OPC_OS_OPENAI_MAX_RETRIES:-2}
      OPC_OS_MAX_CONCURRENCY: ${OPC_OS_MAX_CONCURRENCY:-1}
      OPC_OS_LLM_CACHE_ENABLED: ${OPC_OS_LLM_CACHE_ENABLED:-true}
      OPC_OS_LLM_CACHE_MAX_SIZE: ${OPC_OS_LLM_CACHE_MAX_SIZE:-128}
      OPC_OS_LLM_CACHE_TTL_SECONDS: ${OPC_OS_LLM_CACHE_TTL_SECONDS:-300}
      OPC_OS_SLOW_TASK_THRESHOLD_SECONDS: ${OPC_OS_SLOW_TASK_THRESHOLD_SECONDS:-5}
      OPC_OS_SERVICE_HEARTBEAT_SECONDS: ${OPC_OS_SERVICE_HEARTBEAT_SECONDS:-30}
      OPC_OS_HA_ENABLED: "true"
      OPC_OS_INSTANCE_ID: opc-os-secondary
      OPC_OS_HA_LEASE_TTL_SECONDS: ${OPC_OS_HA_LEASE_TTL_SECONDS:-30}
      OPC_OS_HA_HEARTBEAT_SECONDS: ${OPC_OS_HA_HEARTBEAT_SECONDS:-10}
    volumes:
      - opc-os-data:/app/data
    healthcheck:
      test: ["CMD", "python", "scripts/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  opc-os-lb:
    image: nginx:1.27-alpine
    container_name: opc-os-lb
    profiles: ["ha"]
    ports:
      - "${OPC_OS_LB_PORT:-8080}:8080"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - opc-os
      - opc-os-secondary
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: opc-os-redis
    profiles: ["redis"]
    ports:
      - "${OPC_OS_REDIS_PORT:-6379}:6379"
    restart: unless-stopped

volumes:
  opc-os-data:

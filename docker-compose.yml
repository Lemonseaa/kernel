services:
  loopharness:
    build:
      context: .
    container_name: loopharness
    environment:
      LOOP_HARNESS_DB_PATH: ${LOOP_HARNESS_DB_PATH:-/app/data/loop_harness.db}
      LOOP_HARNESS_DEFAULT_PROVIDER: ${LOOP_HARNESS_DEFAULT_PROVIDER:-minimax}
      LOOP_HARNESS_DRY_RUN: ${LOOP_HARNESS_DRY_RUN:-false}
      LOOP_HARNESS_MINIMAX_API_KEY: ${LOOP_HARNESS_MINIMAX_API_KEY:-}
      LOOP_HARNESS_MINIMAX_MODEL: ${LOOP_HARNESS_MINIMAX_MODEL:-MiniMax-M2.7-highspeed}
      LOOP_HARNESS_MINIMAX_BASE_URL: ${LOOP_HARNESS_MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      LOOP_HARNESS_MINIMAX_TIMEOUT_SECONDS: ${LOOP_HARNESS_MINIMAX_TIMEOUT_SECONDS:-30}
      LOOP_HARNESS_MINIMAX_MAX_RETRIES: ${LOOP_HARNESS_MINIMAX_MAX_RETRIES:-2}
      LOOP_HARNESS_OPENAI_API_KEY: ${LOOP_HARNESS_OPENAI_API_KEY:-}
      LOOP_HARNESS_OPENAI_MODEL: ${LOOP_HARNESS_OPENAI_MODEL:-gpt-4.1-mini}
      LOOP_HARNESS_OPENAI_BASE_URL: ${LOOP_HARNESS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      LOOP_HARNESS_OPENAI_TIMEOUT_SECONDS: ${LOOP_HARNESS_OPENAI_TIMEOUT_SECONDS:-30}
      LOOP_HARNESS_OPENAI_MAX_RETRIES: ${LOOP_HARNESS_OPENAI_MAX_RETRIES:-2}
      LOOP_HARNESS_MAX_CONCURRENCY: ${LOOP_HARNESS_MAX_CONCURRENCY:-1}
      LOOP_HARNESS_LLM_CACHE_ENABLED: ${LOOP_HARNESS_LLM_CACHE_ENABLED:-true}
      LOOP_HARNESS_LLM_CACHE_MAX_SIZE: ${LOOP_HARNESS_LLM_CACHE_MAX_SIZE:-128}
      LOOP_HARNESS_LLM_CACHE_TTL_SECONDS: ${LOOP_HARNESS_LLM_CACHE_TTL_SECONDS:-300}
      LOOP_HARNESS_SLOW_TASK_THRESHOLD_SECONDS: ${LOOP_HARNESS_SLOW_TASK_THRESHOLD_SECONDS:-5}
      LOOP_HARNESS_SERVICE_HEARTBEAT_SECONDS: ${LOOP_HARNESS_SERVICE_HEARTBEAT_SECONDS:-30}
    volumes:
      - loopharness-data:/app/data
    healthcheck:
      test: ["CMD", "python", "scripts/ops/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: loopharness-redis
    profiles: ["redis"]
    ports:
      - "${LOOP_HARNESS_REDIS_PORT:-6379}:6379"
    restart: unless-stopped

volumes:
  loopharness-data:
